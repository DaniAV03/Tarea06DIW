<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main" class="skip-link">Saltar al contenido</a>
  
  <!-- Nav igual -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Tarea06</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="producto.html">Producto</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
          <li class="nav-item"><a class="nav-link" href="busqueda.html">Búsqueda</a></li>
          <li class="nav-item"><a class="nav-link active" href="carrito.html" id="cart-link">Carrito <span id="cart-count">(0)</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main id="main" class="container py-4">
    <h1>Tu carrito</h1>
    <div id="cartEmpty" class="text-center py-5"><p>Carrito vacío</p><a href="index.html" class="btn btn-primary">Volver</a></div>
    <div id="cartList" class="d-none">
      <!-- llenado con js -->
    </div>
    <div id="cartTotal" class="mt-3"><strong>Total: <span id="total">0,00 €</span></strong></div>
  </main>

  <!-- el modal de eliminar-->
  <div class="modal fade" id="delModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">¿Eliminar?</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body" id="delMsg"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger" id="delConfirm">Sí</button>
      </div>
    </div></div>
  </div>

  <div id="notif" class="position-fixed bottom-0 end-0 p-3"></div>
  <button id="toTop" class="btn btn-primary">↑</button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
