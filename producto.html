</head>
<body>
  <a href="#main" class="skip-link">Saltar al contenido</a>
  
  <!-- el mismo nav queel index lo copié-->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Tarea06</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="producto.html">Producto</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
          <li class="nav-item"><a class="nav-link" href="busqueda.html">Búsqueda</a></li>

        </ul>
      </div>
    </div>
  </nav>

  <main id="main" class="container py-4">
    <h1>Producto Ejemplo</h1>
 <img src="img/producto.jpg" alt="Producto" class="img-fluid mb-3 rounded shadow">
    <p>Precio: <strong>19,99 €</strong></p>
    <button id="addCart" class="btn btn-success" 
    data-product='{"id":1, "name":"Producto Ejemplo", "price":19.99, "image":"img/producto.jpg"}'>
    Añadir al carrito
  </button>

  <!-- el modal de eliminar-->
  <div class="modal fade" id="delModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">¿Eliminar?</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="delMsg"></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-danger" id="delConfirm">Sí</button>
        </div>
      </div>
    </div>
  </div>

  <div id="notif" class="position-fixed bottom-0 end-0 p-3"></div>
  <button id="toTop" class="btn btn-primary">↑</button>
